<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- iOS: hide Safari UI chrome and run as a standalone web app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Hello ECS — macroquad + hecs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      /* Fill the safe-area insets on notched/dynamic-island iPhones */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      overflow: hidden;
      background: #14142a;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-family: monospace;
      font-size: 1.2rem;
      background: #14142a;
      z-index: 10;
    }
    #loading.hidden { display: none; }
.spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #7c9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner" id="spinner"></div>
    <span id="loading-text">Loading…</span>
  </div>

  <canvas id="glcanvas" tabindex="1"></canvas>

  <script src="js/mq_js_bundle.js"></script>
  <script>
    // Hide the loading overlay once the WASM module signals it is running.
    const origSet = miniquad_add_plugin;          // hook provided by gl.js
    window.addEventListener("load", () => {
      load("target/wasm32-unknown-unknown/release/hello_ecs.wasm");
    });

    const overlay = document.getElementById("loading");
const draw = document.getElementById("glcanvas");

    // Hide the overlay as soon as the first frame is rendered.
    const observer = new MutationObserver(() => {
      overlay.classList.add("hidden");
      draw.focus();
      observer.disconnect();
    });
    observer.observe(draw, { attributes: true, attributeFilter: ["style", "class"] });

    // Fallback: hide after 3 s if the observer never fires.
    setTimeout(() => {
      overlay.classList.add("hidden");
      draw.focus();
    }, 3000);
  </script>
</body>
</html>
