<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello ECS — macroquad + hecs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #14142a;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-family: monospace;
      font-size: 1.2rem;
      background: #14142a;
      z-index: 10;
    }
    #loading.hidden { display: none; }
.spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #7c9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner" id="spinner"></div>
    <span id="loading-text">Loading…</span>
  </div>

  <canvas id="glcanvas" tabindex="1"></canvas>

  <script src="js/mq_js_bundle.js"></script>
  <script>
    // Collapse Safari's address/tab bar by scrolling 1px then back.
    // Must run after the page has a scrollable height (html is 1px taller than viewport).
    window.addEventListener("load", () => {
      setTimeout(() => { window.scrollTo(0, 1); setTimeout(() => window.scrollTo(0, 0), 50); }, 100);
      load("target/wasm32-unknown-unknown/release/hello_ecs.wasm");
    });

    const overlay = document.getElementById("loading");
const draw = document.getElementById("glcanvas");

    // Hide the overlay as soon as the first frame is rendered.
    const observer = new MutationObserver(() => {
      overlay.classList.add("hidden");
      draw.focus();
      observer.disconnect();
    });
    observer.observe(draw, { attributes: true, attributeFilter: ["style", "class"] });

    // Fallback: hide after 3 s if the observer never fires.
    setTimeout(() => {
      overlay.classList.add("hidden");
      draw.focus();
    }, 3000);
  </script>
</body>
</html>
